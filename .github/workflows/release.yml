name: Build and Release dlpxdbprofiler

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # -------------------------------------------------
  # Matrix build on GitHub-hosted runners
  #   - ubuntu-latest  -> dlpxdbprofiler-linux-glibc2.38
  #   - macos-latest   -> dlpxdbprofiler-macos
  #   - windows-latest -> dlpxdbprofiler-win64.exe
  # -------------------------------------------------
  build:
    name: Build binaries (GitHub-hosted)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile run_dlpxdbprofiler.py \
            --name dlpxdbprofiler \
            --hidden-import decimal \
            --hidden-import secrets \
            --hidden-import array \
            --hidden-import uuid \
            --hidden-import ssl \
            --hidden-import socket \
            --hidden-import select \
            --hidden-import selectors \
            --hidden-import hashlib \
            --hidden-import hmac \
            --hidden-import base64 \
            --hidden-import binascii \
            --hidden-import struct \
            --hidden-import threading \
            --hidden-import types \
            --hidden-import contextlib \
            --hidden-import collections \
            --hidden-import datetime \
            --hidden-import enum \
            --hidden-import io \
            --hidden-import os \
            --hidden-import platform \
            --hidden-import random \
            --hidden-import re \
            --hidden-import string \
            --hidden-import time \
            --hidden-import urllib \
            --hidden-import urllib.parse \
            --hidden-import zlib \
            --hidden-import logging \
            --hidden-import json \
            --hidden-import math \
            --hidden-import functools \
            --hidden-import itertools \
            --hidden-import typing \
            --hidden-import inspect \
            --hidden-import pathlib \
            --hidden-import tempfile \
            --hidden-import cryptography \
            --hidden-import cryptography.hazmat \
            --hidden-import cryptography.hazmat.primitives \
            --hidden-import cryptography.hazmat.primitives.kdf \
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2

      - name: Rename binary per OS
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/dlpxdbprofiler.exe artifacts/dlpxdbprofiler-win64.exe
          elif [ "${{ runner.os }}" = "macOS" ]; then
            mv dist/dlpxdbprofiler artifacts/dlpxdbprofiler-macos
          else
            # Ubuntu / modern Linux (glibc >= 2.38)
            mv dist/dlpxdbprofiler artifacts/dlpxdbprofiler-linux-glibc2.38
          fi

      # Upload artifacts with explicit names per OS

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: dlpxdbprofiler-win64
          path: artifacts/dlpxdbprofiler-win64.exe

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: dlpxdbprofiler-macos
          path: artifacts/dlpxdbprofiler-macos

      - name: Upload Linux (modern/glibc2.38) artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: dlpxdbprofiler-linux-glibc2.38
          path: artifacts/dlpxdbprofiler-linux-glibc2.38

  # -------------------------------------------------
  # CentOS 7–compatible build using centos:7 + vault.centos.org
  #   - glibc 2.17
  #   - Python 3.6 from EPEL (with dataclasses backport)
  #   -> dlpxdbprofiler-linux  (universal Linux build)
  # -------------------------------------------------
  build-centos7:
    name: Build binary (CentOS 7 compatible)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build inside centos:7 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            centos:7 \
            /bin/bash -lc "
              set -e
              # Fix CentOS 7 repos to use vault.centos.org
              sed -i -e 's|^mirrorlist=|#mirrorlist=|g' \
                     -e 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' \
                     /etc/yum.repos.d/CentOS-Base.repo && \
              yum -y install epel-release && \
              yum -y install python36 python36-devel python36-pip gcc gcc-c++ make && \
              python3.6 -m pip install --upgrade pip && \
              # PyInstaller < 6 still supports Python 3.6
              python3.6 -m pip install 'pyinstaller<6' -r requirements.txt && \
              python3.6 -m PyInstaller --onefile run_dlpxdbprofiler.py \
                --name dlpxdbprofiler \
                --hidden-import decimal \
                --hidden-import secrets \
                --hidden-import array \
                --hidden-import uuid \
                --hidden-import ssl \
                --hidden-import socket \
                --hidden-import select \
                --hidden-import selectors \
                --hidden-import hashlib \
                --hidden-import hmac \
                --hidden-import base64 \
                --hidden-import binascii \
                --hidden-import struct \
                --hidden-import threading \
                --hidden-import types \
                --hidden-import contextlib \
                --hidden-import collections \
                --hidden-import datetime \
                --hidden-import enum \
                --hidden-import io \
                --hidden-import os \
                --hidden-import platform \
                --hidden-import random \
                --hidden-import re \
                --hidden-import string \
                --hidden-import time \
                --hidden-import urllib \
                --hidden-import urllib.parse \
                --hidden-import zlib \
                --hidden-import logging \
                --hidden-import json \
                --hidden-import math \
                --hidden-import functools \
                --hidden-import itertools \
                --hidden-import typing \
                --hidden-import inspect \
                --hidden-import pathlib \
                --hidden-import tempfile \
                --hidden-import cryptography \
                --hidden-import cryptography.hazmat \
                --hidden-import cryptography.hazmat.primitives \
                --hidden-import cryptography.hazmat.primitives.kdf \
                --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 && \
              mkdir -p artifacts && \
              mv dist/dlpxdbprofiler artifacts/dlpxdbprofiler-linux
            "

      - name: Upload CentOS 7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dlpxdbprofiler-linux
          path: artifacts/dlpxdbprofiler-linux

  # -------------------------------------------------
  # Release job: creates GitHub Release and attaches
  # all binaries from all build jobs.
  # -------------------------------------------------
  release:
    name: Create GitHub Release
    needs:
      - build
      - build-centos7
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dlpxdbprofiler-linux/dlpxdbprofiler-linux
            dist/dlpxdbprofiler-linux-glibc2.38/dlpxdbprofiler-linux-glibc2.38
            dist/dlpxdbprofiler-macos/dlpxdbprofiler-macos
            dist/dlpxdbprofiler-win64/dlpxdbprofiler-win64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
